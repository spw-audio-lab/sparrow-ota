name: Publish Explore OTA

on:
  push:
    branches: [main]
    paths:
      - channels/explore/**
      - release-assets/**/explore-manifest.json
      - .github/workflows/publish-explore.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read release version
        id: release
        shell: bash
        run: |
          version=$(jq -r '.version' channels/explore/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        shell: bash
        run: |
          cp channels/explore/airplay2-receiver.bin explore-airplay2-receiver.bin
          cp "release-assets/v${{ steps.release.outputs.version }}/explore-manifest.json" explore-manifest.json

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" explore-manifest.json explore-airplay2-receiver.bin --clobber
          else
            gh release create "$tag" explore-manifest.json explore-airplay2-receiver.bin \
              --title "SPARROW Explore ${{ steps.release.outputs.version }}" \
              --notes "Explore channel OTA release ${{ steps.release.outputs.version }}."
          fi
